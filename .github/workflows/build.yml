name: Build InputStream Vivid
on: [push, pull_request]

jobs:
  build:
    name: Build Linux-${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: armv7
            cmake-args: -DCMAKE_SYSTEM_NAME=Linux -DCMAKE_SYSTEM_PROCESSOR=arm -DCMAKE_C_COMPILER=arm-linux-gnueabihf-gcc -DCMAKE_CXX_COMPILER=arm-linux-gnueabihf-g++ -DPLATFORM=linux
          - os: linux
            arch: aarch64
            cmake-args: -DCMAKE_SYSTEM_NAME=Linux -DCMAKE_SYSTEM_PROCESSOR=aarch64 -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ -DPLATFORM=linux

    steps:
      - uses: actions/checkout@v4

      - name: Checkout Kodi Source
        uses: actions/checkout@v4
        with:
          repository: xbmc/xbmc
          ref: Omega
          path: kodi_src
          fetch-depth: 1

      - name: Install Linux Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ pkg-config build-essential \
            gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Debug Kodi Source
        run: |
          echo "=== Find AddonBase.h ==="
          find kodi_src -name "AddonBase.h" 2>/dev/null || echo "Not found"
          echo "=== Find InputStream.h ==="
          find kodi_src -name "InputStream.h" 2>/dev/null || echo "Not found"
          echo "=== Find inputstream dir ==="
          find kodi_src -type d -name "inputstream" 2>/dev/null || echo "Not found"
          echo "=== List kodi-dev-kit/include ==="
          ls -la kodi_src/xbmc/addons/kodi-dev-kit/include/ 2>/dev/null || echo "Not found"
          echo "=== List kodi-dev-kit/include/kodi ==="
          ls -la kodi_src/xbmc/addons/kodi-dev-kit/include/kodi/ 2>/dev/null || echo "Not found"

      - name: Configure and Build
        shell: bash
        run: |
          mkdir -p build
          cmake -B build -S . \
            -DKODI_SOURCE_DIR=${{ github.workspace }}/kodi_src \
            ${{ matrix.cmake-args }}
          cmake --build build --config Release --parallel

      - name: Prepare Artifacts
        shell: bash
        run: |
          ADDON_ID="inputstream.vivid"
          mkdir -p $ADDON_ID
          cp addon.xml $ADDON_ID/
          find build -name "*.so" -exec cp {} $ADDON_ID/$ADDON_ID.so \;
          if [ ! -f $ADDON_ID/$ADDON_ID.so ]; then
            cp build/$ADDON_ID.so $ADDON_ID/ 2>/dev/null || true
          fi
          mkdir -p staging
          mv $ADDON_ID staging/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: inputstream.vivid-linux-${{ matrix.arch }}
          path: staging/
