name: Build InputStream Vivid
on: [push, pull_request]

jobs:
  build:
    name: Build Linux-armv7
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: armv7
            cmake-args: -DCMAKE_SYSTEM_NAME=Linux -DCMAKE_SYSTEM_PROCESSOR=arm -DCMAKE_C_COMPILER=arm-linux-gnueabihf-gcc -DCMAKE_CXX_COMPILER=arm-linux-gnueabihf-g++
          - os: linux
            arch: aarch64
            cmake-args: -DCMAKE_SYSTEM_NAME=Linux -DCMAKE_SYSTEM_PROCESSOR=aarch64 -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++
    steps:
      - uses: actions/checkout@v4

      # 下载Kodi 21源码（和你模板完全一致）
      - name: Checkout Kodi Source
        uses: actions/checkout@v4
        with:
          repository: xbmc/xbmc
          ref: Omega
          path: kodi_src
          fetch-depth: 1

      # 安装编译工具
      - name: Install Linux Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ pkg-config build-essential gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      # 编译（模板原生命令）
      - name: Configure and Build
        shell: bash
        run: |
          cmake -B build -S . \
            -DKODI_SOURCE_DIR=${{ github.workspace }}/kodi_src \
            ${{ matrix.cmake-args }}
          cmake --build build --config Release --parallel

      # 打包
      - name: Prepare Artifacts
        shell: bash
        run: |
          ADDON_ID="inputstream.vivid"
          mkdir -p $ADDON_ID
          cp addon.xml $ADDON_ID/
          find build -name "*.so" -exec cp {} $ADDON_ID/$ADDON_ID.so \;
          mkdir -p staging
          mv $ADDON_ID staging/

      # 上传（固定名称，无任何变量）
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: inputstream.vivid-linux-${{ matrix.arch }}
          path: staging/
